version: "3.9"

services:
  backend:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - .:/app
    restart: unless-stopped

  frontend:
    image: python:3.11-slim
    working_dir: /app
    volumes:
      - .:/app
    ports:
      - "8501:8501"
    env_file:
      - .env
    command: >
      sh -c "pip install streamlit requests --quiet &&
             streamlit run frontend/app.py --server.port 8501 --server.address 0.0.0.0"
    depends_on:
      - backend
    restart: unless-stopped